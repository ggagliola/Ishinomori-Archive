<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime API - Ishinomori Archive</title>
    <link rel="stylesheet" href="css/styles.css" />

    <style>
      .search-bar {
        margin-top: 15px;
        display: flex;
        gap: 10px;
      }

      .search-bar input {
        flex: 1;
        padding: 10px;
        border-radius: 5px;
        border: none;
      }

      .search-bar button {
        padding: 10px 15px;
        background: #ff3c3c;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      .search-bar button:hover {
        background: #ff1f1f;
      }

      .shows-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }

      /* 🔥 FIXED CARD LAYOUT */
      .show-card {
        background: #1e1e1e;
        color: white;
        padding: 15px;
        border-radius: 10px;

        display: flex;
        flex-direction: column;
        justify-content: space-between;

        height: 100%;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .show-card:hover {
        transform: scale(1.03);
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
      }

      .show-card img {
        width: 100%;
        border-radius: 5px;
      }

      .show-card h3 {
        margin: 10px 0 5px;
      }

      .description-preview {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 10px;
      }

      /* keeps button at bottom */
      .card-content {
        flex-grow: 1;
      }

      .show-card a {
        margin-top: auto;
        display: inline-block;
        padding: 8px 12px;
        background: #ff3c3c;
        color: white;
        text-decoration: none;
        border-radius: 5px;
      }

      .show-card a:hover {
        background: #ff1f1f;
      }
    </style>
  </head>

  <body>
    <header>
      <h1 class="header">The Ishinomori Archive</h1>
      <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="shows.html">Shows</a>
        <a class="active" href="api.html">Manga API</a>
      </nav>
    </header>

    <main class="content">
      <h2>Manga Search (Live Data)</h2>
      <h3>
        Use this API to find the manga that started some of these legendary
        shows!
      </h3>

      <div class="search-bar">
        <input
          type="text"
          id="searchInput"
          placeholder="Search manga (e.g. Kikaider)"
        />
        <button id="searchBtn">Search</button>
      </div>

      <div id="anime-container" class="shows-grid">
        <p>Loading manga...</p>
      </div>
    </main>

    <footer class="footer">
      <p>© 2026 The Ishinomori Archive</p>
    </footer>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("anime-container");
        const input = document.getElementById("searchInput");
        const button = document.getElementById("searchBtn");

        // 🔥 NOW USING MANGA ENDPOINT
        async function loadManga(query = "kikaider") {
          try {
            container.innerHTML = "<p>Loading...</p>";

            const res = await fetch(
              `https://api.jikan.moe/v4/manga?q=${query}`,
            );

            const data = await res.json();

            container.innerHTML = "";

            data.data.slice(0, 8).forEach((item) => {
              const card = document.createElement("div");
              card.classList.add("show-card");

              card.innerHTML = `
                <img src="${item.images.jpg.image_url}" />
                
                <div class="card-content">
                  <h3>${item.title}</h3>

                  <p class="description-preview">
                    ${
                      item.synopsis
                        ? item.synopsis.substring(0, 120) + "..."
                        : "No description available."
                    }
                  </p>
                </div>

                <a href="${item.url}" target="_blank">View on MyAnimeList</a>
              `;

              container.appendChild(card);
            });
          } catch (err) {
            console.error(err);
            container.innerHTML =
              "<p>Failed to load manga data. Try again later.</p>";
          }
        }

        button.addEventListener("click", () => {
          const query = input.value.trim();
          if (query) loadManga(query);
        });

        input.addEventListener("keypress", (e) => {
          if (e.key === "Enter") {
            const query = input.value.trim();
            if (query) loadManga(query);
          }
        });

        loadManga();
      });
    </script>
  </body>
</html>
