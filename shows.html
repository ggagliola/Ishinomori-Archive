<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="images/favicon-32x32.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>Shows - The Ishinomori Archive</title>

    <style>
      .shows-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }

      .show-card {
        background: #1e1e1e;
        color: white;
        padding: 15px;
        border-radius: 10px;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .show-card:hover {
        transform: scale(1.03);
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
      }
      .show-card:hover h3 {
        color: #ff3c3c;
      }
      .show-card h3 {
        margin-top: 0;
      }

      .show-card a {
        display: inline-block;
        margin-top: 10px;
        padding: 8px 12px;
        background: #ff3c3c;
        color: white;
        text-decoration: none;
        border-radius: 5px;
      }

      .description-preview {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
    </style>
  </head>

  <body>
    <header>
      <h1 class="header">The Ishinomori Archive</h1>
      <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="bio.html">Biography</a>
        <a class="active" href="shows.html">Shows</a>
        <a href="contact.html">Contact Us</a>
        <a href="admin.html">Admin</a>
      </nav>
    </header>

    <main class="content">
      <h2>All Shows</h2>
      <div id="shows-container" class="shows-grid">
        <p>Loading shows...</p>
      </div>
    </main>

    <footer class="footer">
      <p>© 2026 The Ishinomori Archive</p>
    </footer>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAKDct_AamhPAuonkwef6utDC51ZudjMkc",
        authDomain: "ishinomori-archive.firebaseapp.com",
        projectId: "ishinomori-archive",
        storageBucket: "ishinomori-archive.firebasestorage.app",
        messagingSenderId: "288552098418",
        appId: "1:288552098418:web:277d01f180e22fee9500eb",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      const container = document.getElementById("shows-container");

      const snapshot = await getDocs(collection(db, "shows"));

      container.innerHTML = "";

      snapshot.forEach((doc) => {
        const show = doc.data();

        const card = document.createElement("div");
        card.classList.add("show-card");

        card.innerHTML = `
          <h3>${show.title}</h3>
          <p class="description-preview">${show.description || ""}</p>
          <a href="show.html?id=${doc.id}">View Details</a>
        `;

        container.appendChild(card);
      });
    </script>
  </body>
</html>
