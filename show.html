<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="images/favicon-32x32.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>Show - Ishinomori Archive</title>

    <style>
      .section {
        margin-top: 25px;
      }

      .section h3 {
        border-bottom: 1px solid #ccc;
        padding-bottom: 5px;
        margin-bottom: 10px;
      }

      ul {
        padding-left: 20px;
        width: 45%;
      }

      li {
        margin-bottom: 5px;
      }

      .video-grid {
        display: grid;
        gap: 20px;
        margin-top: 10px;
      }
      img {
        width: 35%;
        margin-left: 450px;
        margin-top: -120px;
      }
    </style>
  </head>

  <body>
    <header>
      <h1 class="header">The Ishinomori Archive</h1>
      <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="bio.html">Biography</a>
        <a href="shows.html">Shows</a>
        <a href="contact.html">Contact Us</a>
      </nav>
    </header>

    <main class="content">
      <div id="show-container">
        <p>Loading show...</p>
      </div>
    </main>

    <footer class="footer">
      <p>© 2026 The Ishinomori Archive</p>
    </footer>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getFirestore,
        doc,
        getDoc,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAKDct_AamhPAuonkwef6utDC51ZudjMkc",
        authDomain: "ishinomori-archive.firebaseapp.com",
        projectId: "ishinomori-archive",
        storageBucket: "ishinomori-archive.firebasestorage.app",
        messagingSenderId: "288552098418",
        appId: "1:288552098418:web:277d01f180e22fee9500eb",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      const container = document.getElementById("show-container");

      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");

      function toList(data) {
        if (!data) return [];
        if (Array.isArray(data)) return data;
        if (typeof data === "string") {
          return data
            .split("\n")
            .map((x) => x.trim())
            .filter(Boolean);
        }
        return [];
      }

      async function loadShow() {
        if (!id) {
          container.innerHTML = "<p>No show selected.</p>";
          return;
        }

        try {
          const snap = await getDoc(doc(db, "shows", id));

          if (!snap.exists()) {
            container.innerHTML = "<p>Show not found.</p>";
            return;
          }

          const show = snap.data();

          const cast = toList(show.cast);
          const trivia = toList(show.trivia);
          const videos = toList(show.videos);

          container.innerHTML = `
            <h2>${show.title || "Untitled"}</h2>
            <p>${show.description || ""}</p>

            <div class="section">
              <h3>Plot</h3>
              <p>${show.plot || "No plot available."}</p>
            </div>

            <div class="section">
              <h3>Legacy</h3>
              <p>${show.legacy || "No legacy available."}</p>
            </div>

            <div class="section">
              <h3>Cast</h3>
              <div id="cast-section"></div>
              <img src= "${show.image}"> 
            </div>

            <div class="section">
              <h3>Trivia</h3>
              <div id="trivia-section"></div>
            </div>

            <div class="section">
              <h3>Videos</h3>
              <div id="video-grid" class="video-grid"></div>
            </div>
          `;

          document.getElementById("cast-section").innerHTML = `
            <ul>
              ${cast.length ? cast.map((x) => `<li>${x}</li>`).join("") : "<li>No cast available.</li>"}
            </ul>
          `;

          document.getElementById("trivia-section").innerHTML = `
            <ul>
              ${trivia.length ? trivia.map((x) => `<li>${x}</li>`).join("") : "<li>No trivia available.</li>"}
            </ul>
          `;

          const videoGrid = document.getElementById("video-grid");

          if (videos.length) {
            videos.forEach((url) => {
              const iframe = document.createElement("iframe");
              iframe.width = "100%";
              iframe.height = "315";
              iframe.src = url;
              iframe.frameBorder = "0";
              iframe.allow =
                "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
              iframe.allowFullscreen = true;
              videoGrid.appendChild(iframe);
            });
          } else {
            videoGrid.innerHTML = "<p>No videos available.</p>";
          }
        } catch (err) {
          console.error(err);
          container.innerHTML = "<p>Error loading show data.</p>";
        }
      }

      loadShow();
    </script>
  </body>
</html>
